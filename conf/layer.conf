# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-raspberrypi-simpat"
BBFILE_PATTERN_meta-raspberrypi-simpat = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-raspberrypi-simpat = "6"

LAYERDEPENDS_meta-raspberrypi-simpat = "core raspberrypi"
LAYERSERIES_COMPAT_meta-raspberrypi-simpat = "kirkstone"
